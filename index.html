<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="创建短链接和 Markdown 便签">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>SLink</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="preconnect" href="https://registry.npmmirror.com" crossorigin>
    <link rel="stylesheet" href="https://registry.npmmirror.com/lxgw-wenkai-screen-web/1.522.0/files/style.css">
    <link rel="stylesheet" href="/assets/css/app.css">
    <script type="module" src="/assets/js/app.js"></script>
</head>
<body>
    <main class="app-shell">
        <header class="app-header">
            <h1>SLink</h1>
            <p>短链接与 Markdown 便签</p>
        </header>

        <div class="workspace">
            <div class="tabs" role="tablist" aria-label="创建类型">
                <button class="tab active" id="shortenTab" type="button" role="tab" aria-selected="true" aria-controls="shortenPanel" data-tab="shorten">短链接</button>
                <button class="tab" id="noteTab" type="button" role="tab" aria-selected="false" aria-controls="notePanel" data-tab="note">Markdown 便签</button>
            </div>

            <section class="tab-panel active" id="shortenPanel" role="tabpanel" aria-labelledby="shortenTab" data-panel="shorten">
                <form id="shortenForm" novalidate>
                    <label class="field">
                        <span>原始网址</span>
                        <input id="originalUrl" type="text" inputmode="url" autocomplete="url" placeholder="example.com/page" required>
                    </label>
                    <label class="field">
                        <span>自定义短码 <small>可选</small></span>
                        <input id="customSlug" type="text" autocomplete="off" maxlength="64" pattern="[A-Za-z0-9_-]+" placeholder="例如 docs-2026">
                    </label>
                    <button class="submit-button" id="shortenButton" type="submit">
                        <span data-label>生成短链接</span>
                        <span data-loading hidden>正在生成...</span>
                    </button>
                </form>
            </section>

            <section class="tab-panel" id="notePanel" role="tabpanel" aria-labelledby="noteTab" data-panel="note" hidden>
                <form id="noteForm" novalidate>
                    <label class="field">
                        <span>标题 <small>可选</small></span>
                        <input id="noteTitle" type="text" maxlength="160" autocomplete="off" placeholder="便签标题">
                    </label>
                    <label class="field">
                        <span>Markdown 正文</span>
                        <textarea id="noteContent" rows="12" maxlength="500000" placeholder="# 标题&#10;&#10;支持表格、任务列表、代码块等 GFM 语法" required></textarea>
                    </label>
                    <button class="submit-button" id="noteButton" type="submit">
                        <span data-label>创建便签</span>
                        <span data-loading hidden>正在创建...</span>
                    </button>
                </form>
            </section>

            <section class="result" id="result" aria-live="polite" hidden>
                <div class="result-heading">
                    <h2 id="resultTitle">创建成功</h2>
                    <span class="result-time" id="resultTime"></span>
                </div>
                <div class="result-url">
                    <input id="resultUrl" type="text" readonly aria-label="生成的地址">
                    <button id="copyButton" type="button">复制</button>
                </div>
                <p class="result-detail" id="resultDetail"></p>
            </section>

            <div class="error-message" id="errorMessage" role="alert" hidden></div>
        </div>
    </main>
</body>
</html>
